name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: "3.9"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        pip install flake8
        # Exclude the virtual environment folder to avoid checking library source code
        flake8 . --count --exclude=mlops_env,venv,env,.venv --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Syntax Check Scripts
      run: |
        # This ensures your main scripts are at least valid Python code
        python -m py_compile pipeline.py generate_data.py producer.py consumer.py

    - name: Verify Documentation Presence
      run: |
        # Quick check to ensure you haven't deleted the required reports
        test -f README.md
        test -f REPORT.md
        test -f STREAMING_REPORT.md